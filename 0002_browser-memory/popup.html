<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Browser Memory</title>
    <style>
      body {
        font-family: sans-serif;
        margin: 0;
        padding: 10px;
        width: 320px;
      }
      #results {
        max-height: 300px;
        overflow-y: auto;
        margin-top: 10px;
      }
      .doc {
        margin-bottom: 10px;
        border-bottom: 1px solid #e0e0e0;
        padding-bottom: 6px;
      }
      .doc-title {
        font-weight: bold;
        margin-bottom: 2px;
      }
      input[type="text"] {
        width: 100%;
        box-sizing: border-box;
        padding: 6px;
      }
      button {
        width: 100%;
        padding: 8px;
        margin-top: 6px;
      }
    </style>
  </head>
  <body>
    <button id="saveBtn">Save this page</button>
    <input type="text" id="searchInput" placeholder="Search saved pages">
    <div id="results"></div>
    <script src="popup.js"></script>
  </body>
</html>
