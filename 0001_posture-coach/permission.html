<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>카메라 권한 — Posture Coach</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        max-width: 520px;
        margin: 0 auto;
        padding: 48px 24px;
        color: #111827;
        line-height: 1.6;
      }
      h1 { font-size: 22px; margin-bottom: 8px; }
      p { color: #374151; margin-bottom: 16px; }
      #status {
        padding: 14px 16px;
        border-radius: 10px;
        font-weight: 600;
        margin-bottom: 16px;
      }
      #status.pending { background: #eef2ff; color: #4338ca; }
      #status.ok { background: #dcfce7; color: #15803d; }
      #status.fail { background: #fee2e2; color: #b91c1c; }
      video {
        width: 100%;
        border-radius: 12px;
        background: #000;
        aspect-ratio: 4 / 3;
        object-fit: cover;
        margin-bottom: 16px;
      }
      button {
        padding: 10px 18px;
        border: none;
        border-radius: 9px;
        background: #4f46e5;
        color: #fff;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }
      ol { margin: 12px 0 0 20px; color: #374151; }
      li { margin-bottom: 6px; }
    </style>
  </head>
  <body>
    <h1>🪑 카메라 권한 허용</h1>
    <p>
      Posture Coach가 자세를 감지하려면 카메라 접근 권한이 필요해요. 아래에서 한 번만
      허용하면 사이드 패널에서도 바로 쓸 수 있습니다. (영상은 기기 밖으로 전송되지 않아요.)
    </p>
    <div id="status" class="pending">카메라 권한을 요청하는 중…</div>
    <video id="preview" autoplay muted playsinline></video>
    <button id="retry">다시 시도</button>
    <ol id="help" style="display: none">
      <li>주소창 오른쪽(또는 왼쪽)의 <b>카메라 아이콘 🎥</b>을 클릭하세요.</li>
      <li><b>항상 허용</b>으로 바꾸고 페이지를 새로고침하세요.</li>
      <li>허용되면 이 탭을 닫고 사이드 패널에서 <b>카메라 시작</b>을 누르세요.</li>
    </ol>
    <script src="permission.js"></script>
  </body>
</html>
